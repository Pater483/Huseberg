name: Bygg och deploya sommarstugan

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checka ut kod
        uses: actions/checkout@v4

      - name: Sätt upp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installera beroenden
        run: pip install openpyxl

      - name: Konvertera Excel → JSON (om bookings.xlsx finns)
        run: |
          if [ -f bookings.xlsx ]; then
            python convert.py
          else
            echo "Ingen bookings.xlsx ännu, använder befintlig data.json"
          fi

      - name: Sätt upp Pages
        uses: actions/configure-pages@v5

      - name: Ladda upp artefakt
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploya till GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
